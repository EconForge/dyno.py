[workspace]
authors = ["Pablo Winant <pablo.winant@gmail.com>","Ousema Bouaneni <ousema.bouaneni@polytechnique.edu>"]
description = "Macroeconomic model solver"
channels = ["conda-forge"]

preview = ["pixi-build"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[package]
name = "dyno"
version = "0.1.8"

[pypi-dependencies]
dyno = { path = "." , editable = true}

[dependencies]
python = ">=3.10,<3.14"
rich = ">=14.3.2,<15"
interegular = ">=0.3.3,<0.4"
sympy = ">=1.14.0,<2"
altair = ">=6.0.0,<7"
tempita = ">=0.6.0,<0.7"
pytest = ">=9.0.2,<10"
numpy = ">=2.4.2,<3" # Compatibility with notebook.link scipy
scipy = ">=1.17.0,<2"
pandas = ">=3.0.0,<4"
typing_extensions = ">=4.15.0,<5"
plotly = ">=6.5.2,<7"
black = ">=26.1.0,<27"
pathspec = ">=1.0.4,<2"
ripgrep = ">=15.1.0,<16"
lark = ">=1.3.1,<2"
pyyaml = ">=6.0.3,<7"

[feature.dynare.target.linux.dependencies]
dynare-preprocessor-pylib = ">=0.0.0.dev1,<0.0.0.dev2"

[feature.dynare-task.tasks]
dynare = "python -c \"from dyno.cli import dynare_cmd; dynare_cmd()\""

[package.build]
backend = { name = "pixi-build-python", version = ">=0.4.0" }

[package.build.config]
noarch = true

[package.host-dependencies] 
hatchling = "==1.26.3"
python = "<3.14,>=3.12"

[feature.test.dependencies]
pytest = ">=9.0.2,<10"
coverage = ">=7.13.4,<8"
pytest-cov = ">=7.0.0,<8"

[feature.test.tasks]
test = "pytest --ignore=tests/dynare"
test-all = "pytest"
test-dynare = "pytest tests/dynare"
durations = "pytest --ignore=tests/dynare --durations=0 -vv"
cov = "pytest --ignore=tests/dynare --cov=./ --cov-report=xml"

[feature.lint.dependencies]
mypy = ">=1.19.1,<2"
pandas-stubs = ">=3.0.0.260204,<4"
scipy-stubs = ">=1.17.0.2,<2"
types-mock = ">=5.2.0.20250924,<6"
types-pyyaml = ">=6.0.12.20250915,<7"
black = ">=26.1.0,<27"

[feature.lint.tasks]
typecheck = "mypy src --ignore-missing-imports"
black = "black src tests scratch"
ci-qc = "black src tests scratch --check"

[feature.gui.dependencies]
mock = ">=5.2.0,<6"
ipyvuetify = ">=1.11.3,<2"
solara = ">=1.57.1,<2"
solara-ui = ">=1.57.1,<2"
solara-server = ">=1.57.1,<2"
anywidget = ">=0.9.21,<0.10"

[feature.gui.tasks]
solara = "solara run examples/rbc_gui.py"

[feature.jupyter.dependencies]
jupyterlab = ">=4.5.4,<5"
ipykernel = ">=7.2.0,<8"
matplotlib = ">=3.10.8,<4"
notebook = ">=7.5.3,<8"

[feature.jupyter.tasks]
notebook = "ipython kernel install --name $PIXI_ENVIRONMENT_NAME --user && jupyter notebook"
jlab = "ipython kernel install --name $PIXI_ENVIRONMENT_NAME --user && jupyter lab"
ipython = "ipython"

[feature.docs.dependencies]
mkdocs = ">=1.6.1,<2"
mkdocstrings-python = ">=2.0.2,<3"
mkdocs-material = ">=9.7.1,<10"
pymdown-extensions = ">=10.21.1,<11"
python-markdown-math = ">=0.9,<0.10"

[feature.docs.tasks]
docs = "mkdocs serve"

[feature.py310.dependencies]
python = ">=3.10.0,<3.11"

[feature.py311.dependencies]
python = ">=3.11.0,<3.12"

[feature.py312.dependencies]
python = ">=3.12.0,<3.13"

[feature.py313.dependencies]
python = ">=3.13.0,<3.14"

# [feature.experimental.dependencies]
# sympy = "*"
# python-symengine = "*"

[feature.experimental.pypi-dependencies]
jax = ">=0.4.38,<0.5"


[environments]
test = ["test"]
prod = ["jupyter"]
solara = ["gui"]
dev = ["test", "lint", "jupyter", "docs"]
dynare = ["dynare", "dynare-task"]
dev-dynare = ["test", "lint", "jupyter", "docs", "dynare"]
dev-experimental = ["test", "lint", "jupyter", "docs", "experimental"]
py312 = ["test", "lint", "py312"]
py313 = ["test", "lint", "py313"]
